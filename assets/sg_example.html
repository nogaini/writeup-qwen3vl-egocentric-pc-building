<html>
    <head>
        <meta charset="utf-8">
        
            <script src="lib/bindings/utils.js"></script>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" integrity="sha512-WgxfT5LWjfszlPHXRmBWHkV2eceiWTOBvrKCNbdgDYTHrT2AeLCGbF4sZlZw3UMN3WtL0tGUoIAKsu8mllg/XA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
            <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js" integrity="sha512-LnvoEWDFrqGHlHmDD2101OrLcbsfkrzoSpvtSQtxK3RMnRV0eOkhhBN2dXHKRrUU8p2DGRTk35n4O8nWSVe1mQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
            
        <style type="text/css">
             html, body { margin: 0; padding: 0; overflow: hidden; background: #0e1117; }
             #mynetwork {
                 width: 100%;
                 height: 100vh;
                 background-color: #0e1117;
                 position: relative;
             }
        </style>
    </head>


    <body>
        <div id="mynetwork"></div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#e06c75", "font": {"color": "white"}, "id": "n0", "label": "Hands", "shape": "dot", "title": "Hands"}, {"color": "#4c8eda", "font": {"color": "white"}, "id": "n1", "label": "Motherboard", "shape": "dot", "title": "Motherboard"}, {"color": "#56b6c2", "font": {"color": "white"}, "id": "n2", "label": "Box", "shape": "dot", "title": "Box"}, {"color": "#4c8eda", "font": {"color": "white"}, "id": "n3", "label": "CPU", "shape": "dot", "title": "CPU"}, {"color": "#4c8eda", "font": {"color": "white"}, "id": "n4", "label": "M2_Drive", "shape": "dot", "title": "M2_Drive"}, {"color": "#56b6c2", "font": {"color": "white"}, "id": "n5", "label": "Box", "shape": "dot", "title": "Box"}, {"color": "#56b6c2", "font": {"color": "white"}, "id": "n6", "label": "Box", "shape": "dot", "title": "Box"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "#aaaaaa", "from": "n0", "label": "holds", "to": "n1"}, {"arrows": "to", "color": "#aaaaaa", "from": "n1", "label": "is_unboxed", "to": "n2"}, {"arrows": "to", "color": "#aaaaaa", "from": "n0", "label": "holds", "to": "n3"}, {"arrows": "to", "color": "#aaaaaa", "from": "n3", "label": "is_unboxed", "to": "n5"}, {"arrows": "to", "color": "#aaaaaa", "from": "n4", "label": "is_unboxed", "to": "n6"}, {"arrows": "to", "color": "#aaaaaa", "from": "n0", "label": "holds", "to": "n4"}, {"arrows": "to", "color": "#aaaaaa", "from": "n0", "label": "inserting", "to": "n3"}, {"arrows": "to", "color": "#aaaaaa", "from": "n1", "label": "seated_in", "to": "n3"}, {"arrows": "to", "color": "#aaaaaa", "from": "n0", "label": "inserting", "to": "n4"}, {"arrows": "to", "color": "#aaaaaa", "from": "n1", "label": "seated_in", "to": "n4"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "barnesHut": {
            "avoidOverlap": 0,
            "centralGravity": 0.3,
            "damping": 0.09,
            "gravitationalConstant": -3000,
            "springConstant": 0.001,
            "springLength": 80
        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
    </body>
</html>
