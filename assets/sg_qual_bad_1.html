<html>
    <head>
        <meta charset="utf-8">
            <script src="lib/bindings/utils.js"></script>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" integrity="sha512-WgxfT5LWjfszlPHXRmBWHkV2eceiWTOBvrKCNbdgDYTHrT2AeLCGbF4sZlZw3UMN3WtL0tGUoIAKsu8mllg/XA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
            <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js" integrity="sha512-LnvoEWDFrqGHlHmDD2101OrLcbsfkrzoSpvtSQtxK3RMnRV0eOkhhBN2dXHKRrUU8p2DGRTk35n4O8nWSVe1mQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <style type="text/css">
             html, body { margin: 0; padding: 0; overflow: hidden; background: #0e1117; }
             #mynetwork {
                 width: 100%;
                 height: 100vh;
                 background-color: #0e1117;
                 position: relative;
             }
        </style>
    </head>
    <body>
        <div id="mynetwork"></div>
        <script type="text/javascript">
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = { item: '', property: '', value: [] };

              function drawGraph() {
                  var container = document.getElementById('mynetwork');
                  nodes = new vis.DataSet([]);
                  edges = new vis.DataSet([]);
                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  data = {nodes: nodes, edges: edges};
                  var options = {
    "configure": { "enabled": false },
    "edges": { "color": { "inherit": true }, "smooth": { "enabled": true, "type": "dynamic" } },
    "interaction": { "dragNodes": true, "hideEdgesOnDrag": false, "hideNodesOnDrag": false },
    "physics": {
        "barnesHut": {
            "avoidOverlap": 0, "centralGravity": 0.3, "damping": 0.09,
            "gravitationalConstant": -3000, "springConstant": 0.001, "springLength": 80
        },
        "enabled": true,
        "stabilization": { "enabled": true, "fit": true, "iterations": 1000, "onlyDynamicEdges": false, "updateInterval": 50 }
    }
};
                  network = new vis.Network(container, data, options);
                  return network;
              }
              drawGraph();
        </script>
    </body>
</html>
